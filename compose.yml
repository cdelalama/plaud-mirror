services:
  plaud-mirror:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_BASE_IMAGE: ${PLAUD_MIRROR_DOCKER_BUILD_IMAGE:-node:20-bookworm-slim}
        RUNTIME_BASE_IMAGE: ${PLAUD_MIRROR_DOCKER_RUNTIME_IMAGE:-node:20-bookworm-slim}
    user: "1000:1000"
    ports:
      - "3040:3040"
    environment:
      PLAUD_MIRROR_MASTER_KEY: ${PLAUD_MIRROR_MASTER_KEY:?set PLAUD_MIRROR_MASTER_KEY}
      # Operator access control (D-018). Empty = auth disabled (open panel,
      # /api/health carries a warning). Set a passphrase to require login.
      PLAUD_MIRROR_ADMIN_PASSPHRASE: ${PLAUD_MIRROR_ADMIN_PASSPHRASE:-}
      PLAUD_MIRROR_API_BASE: ${PLAUD_MIRROR_API_BASE:-}
      PLAUD_MIRROR_WEBHOOK_URL: ${PLAUD_MIRROR_WEBHOOK_URL:-}
      PLAUD_MIRROR_WEBHOOK_SECRET: ${PLAUD_MIRROR_WEBHOOK_SECRET:-}
      PLAUD_MIRROR_DEFAULT_SYNC_LIMIT: ${PLAUD_MIRROR_DEFAULT_SYNC_LIMIT:-100}
      PLAUD_MIRROR_SYNC_MAX_RUNTIME_MS: ${PLAUD_MIRROR_SYNC_MAX_RUNTIME_MS:-3600000}
    volumes:
      - ./runtime/data:/var/lib/plaud-mirror/data
      - ./runtime/recordings:/var/lib/plaud-mirror/recordings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3040/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
